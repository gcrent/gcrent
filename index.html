        {seccion==="equipos"&&rol==="admin"&&(<>

                </div>

            </div>
          </div>
        </>)}

        {/* PROMOS */}
        {seccion==="promos"&&rol==="admin"&&(<>

                      <span style={{textDecoration:"line-through",color:"var(--mid)",fontSize:".75rem"}}>${e?.precio.toLocaleString()}</span>
                      <span style={{fontWeight:700,color:"var(--purple)",fontSize:".95rem"}}>${pp.toLocaleString()}</span>
                      <span style={{padding:".13rem .5rem",borderRadius:99,fontSize:".62rem",fontWeight:700,background:"#EDE9FE",color:"#4C1D95"}}>-{p.descuento}%</span>
                    </div>
                  </div>
                  <button onClick={()=>togglePromo(p)} style={{padding:".3rem .7rem",borderRadius:8,border:"none",background:p.activa?"var(--green)":"var(--sand)",color:p.activa?"#fff":"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>{p.activa?"Activa":"Inactiva"}</button>
                </div>
              </div>
            );
          })}
        </>)}

        {seccion==="buscar"&&rol==="admin"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem",flexWrap:"wrap",gap:".5rem"}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",margin:0}}>🔍 Buscar</h2>
            {btn("📥 Excel",exportarExcel,"var(--green)")}
          </div>
          <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,padding:".8rem .95rem",marginBottom:".9rem",display:"flex",gap:".6rem",alignItems:"flex-end",flexWrap:"wrap"}}>

          </div>
        </>)}

        {/* TRANSPORTISTA */}
        {seccion==="logistica"&&rol==="transportista"&&(()=>{
          const inicioSem = getLunes(hoy), finSem = addD(inicioSem,6);
          const inicioMes = new Date(hoy.getFullYear(),hoy.getMonth(),1);
          const finMes    = new Date(hoy.getFullYear(),hoy.getMonth()+1,0);
          const enPeriodo = r => {
            const d = new Date(r.fecha+"T12:00");
            return periodoTransp==="semana" ? d>=inicioSem&&d<=finSem : d>=inicioMes&&d<=finMes;
          };
          const entregasPendientes = reservas.filter(r=>r.estado==="aceptada"&&enPeriodo(r));
          const entregadas         = reservas.filter(r=>r.estado==="activo"&&enPeriodo(r));
          const retiradas          = reservas.filter(r=>r.estado==="completado"&&enPeriodo(r));
          const mostrar = filtroTransp==="pendiente" ? entregasPendientes

                {k:"retirado", l:`✅ Retirados (${retiradas.length})`}
              ].map(f=>(
                <button key={f.k} onClick={()=>setFiltroTransp(f.k)} style={{padding:".4rem .85rem",borderRadius:8,border:"none",background:filtroTransp===f.k?"var(--blue)":"var(--sand)",color:filtroTransp===f.k?"#fff":"var(--mid)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:".76rem",fontWeight:600}}>{f.l}</button>

                  <span style={{fontWeight:700,color:"var(--blue)",fontSize:".9rem"}}>💰 ${(r.tarifaTransporte||tarifaBase).toLocaleString()}</span>

                <div style={{display:"flex",gap:".3rem",marginTop:".6rem",flexWrap:"wrap"}}>
                  {r.estado==="aceptada"&&btn("✅ Entregado",()=>cambiarEstado(r.id,"activo"),"var(--blue)")}

                    {btn("↩️ Retirado — cobrar $"+(r.tarifaTransporte||tarifaBase).toLocaleString(),()=>cambiarEstado(r.id,"completado"),"var(--green)")}
                    {btn("← Deshacer entrega",()=>cambiarEstado(r.id,"aceptada"),"#E8E0D5","var(--mid)")}
                  </>}
                  {r.estado==="completado"&&<>
                    <span style={{fontSize:".75rem",color:"var(--green)",fontWeight:700}}>✅ Cobrado — ${(r.tarifaTransporte||tarifaBase).toLocaleString()}</span>
                    {btn("← Deshacer retiro",()=>cambiarEstado(r.id,"activo"),"#E8E0D5","var(--mid)")}
                  </>}
                </div>
              </div>
            ))}
          </>);
        })()}

        {seccion==="semana"&&rol==="transportista"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem",flexWrap:"wrap",gap:".4rem"}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",margin:0}}>💰 Mi Semana</h2>
            <div style={{display:"flex",gap:".3rem"}}>
              {btn("‹",()=>setSemOff(o=>o-1),"var(--mid)")}
              {btn("Hoy",()=>setSemOff(0),"var(--mid)")}
              {btn("›",()=>setSemOff(o=>o+1),"var(--mid)")}
            </div>
          </div>
          <div style={{background:"var(--blue)",color:"#fff",padding:".58rem .9rem",fontWeight:600,fontSize:".8rem",display:"flex",justifyContent:"space-between",borderRadius:"12px 12px 0 0"}}>
            <span>{semLabel(lunesSem)}</span><span>Total: ${totalSem.toLocaleString()}</span>
          </div>
          <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
            {resSem.length===0?<div style={{padding:"1.4rem",textAlign:"center",color:"var(--mid)",fontSize:".8rem"}}>Sin viajes.</div>
            :<TablaReservas rs={resSem.sort((a,b)=>a.fecha.localeCompare(b.fecha))} acciones={false}/>}
          </div>
        </>)}

        {/* CLIENTE */}
        {seccion==="calendario_cliente"&&rol==="cliente"&&(<>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:".8rem"}}>📅 Mi calendario</h2>

          {selDay&&(()=>{
            const mis=reservas.filter(r=>(r.clienteTel===clienteTel||r.clienteEmail===clienteTel)&&r.fecha===selDay&&r.estado!=="cancelado");
            return mis.length>0?(
              <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,marginTop:".8rem",overflow:"hidden"}}>
                <div style={{background:"var(--light)",padding:".6rem 1rem",fontWeight:700,fontSize:".82rem",borderBottom:"1px solid var(--sand)"}}>Mis reservas del {fmtVis(selDay)}</div>

                  <div key={r.id} style={{padding:".55rem 1rem",borderBottom:"1px solid var(--sand)",display:"flex",alignItems:"center",gap:".7rem"}}>
                    {RC(r).map((c,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:c}}/>)}
                    <div style={{flex:1}}><div style={{fontWeight:600,fontSize:".82rem"}}>{r.horaEntrega||"—"} — {IL(r)}</div><div style={{fontSize:".72rem",color:"var(--mid)"}}>Monto: ${r.monto.toLocaleString()}</div></div>

        {seccion==="buscar_cliente"&&rol==="cliente"&&(()=>{
          const mis=reservas.filter(r=>r.clienteTel===clienteTel||r.clienteEmail===clienteTel).sort((a,b)=>a.fecha.localeCompare(b.fecha));
          return (<>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:".8rem"}}>🔍 Mis Reservas</h2>
            {mis.length===0?<div style={{textAlign:"center",padding:"3rem",color:"var(--mid)"}}>No tenés reservas registradas aún.</div>:<TablaReservas rs={mis} acciones={false} mostrarCliente={false}/>}
          </>);
        })()}

      </main>

      {/* MODALES */}
      {modal==="nueva"&&<FormReserva titulo="Nueva Reserva" form={form} fv={fv} promos={promos} combos={combos} equipos={equipos} onSubmit={guardarReserva} onCancel={()=>setModal(null)} submitLabel="Guardar reserva"/>}
      {modal==="editar"&&editRes&&<FormReserva titulo={`Editar — ${editRes.clienteNombre}`} form={form} fv={fv} promos={promos} combos={combos} equipos={equipos} onSubmit={guardarEdicion} onCancel={()=>{setModal(null);setEditRes(null);setForm(FDEF);}} submitLabel="Guardar cambios"/>}

      {modal==="equipo"&&(
        <Overlay onClose={()=>{setModal(null);setEditEquipo(null);setEquipoForm({nombre:"",emoji:"🔧",desc:"",precio:""}); }} maxW={420}>
          <div style={S.modalHead}>{editEquipo?"✏️ Editar Equipo":"🔧 Nuevo Equipo"} <CloseBtn onClose={()=>{setModal(null);setEditEquipo(null);setEquipoForm({nombre:"",emoji:"🔧",desc:"",precio:""}); }}/></div>
          <div style={{padding:"1.1rem"}}>
            <div style={S.fg}><label style={S.lbl}>Nombre</label><input value={equipoForm.nombre} onChange={e=>setEquipoForm(f=>({...f,nombre:e.target.value}))} placeholder="Ej: Radiofrecuencia Corporal" style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Emoji</label><input value={equipoForm.emoji} onChange={e=>setEquipoForm(f=>({...f,emoji:e.target.value}))} placeholder="🔧" style={{...S.inp,fontSize:"1.2rem"}}/></div>
            <div style={S.fg}><label style={S.lbl}>Descripción</label><input value={equipoForm.desc} onChange={e=>setEquipoForm(f=>({...f,desc:e.target.value}))} placeholder="Descripción corta" style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Precio de alquiler</label><input type="number" value={equipoForm.precio} onChange={e=>setEquipoForm(f=>({...f,precio:e.target.value}))} placeholder="0" style={S.inp}/></div>
          </div>
          <div style={S.modalFoot}>
            <button onClick={()=>setModal(null)} style={{padding:".4rem .85rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>Cancelar</button>
            {btn("Agregar equipo",guardarEquipo,"var(--bronze)")}
          </div>
        </Overlay>
      )}

      {modal==="duplicar"&&editRes&&(
        <Overlay onClose={()=>setModal(null)} maxW={400}>
          <div style={S.modalHead}>📋 Duplicar <CloseBtn onClose={()=>setModal(null)}/></div>
          <div style={{padding:"1.1rem"}}>
            <div style={{background:"var(--light)",borderRadius:10,padding:".85rem",marginBottom:".85rem",fontSize:".8rem"}}><strong>{editRes.clienteNombre}</strong> · {IL(editRes)}<br/>{fmtVis(editRes.fecha)}</div>
            <div style={S.fg}><label style={S.lbl}>Nueva fecha</label><input type="date" value={dupFecha} onChange={e=>setDupFecha(e.target.value)} style={S.inp}/></div>
          </div>
          <div style={S.modalFoot}>
            <button onClick={()=>setModal(null)} style={{padding:".4rem .85rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>Cancelar</button>
            {btn("Duplicar",()=>duplicarReserva(editRes),"var(--teal)")}
          </div>
        </Overlay>
      )}

      {modal==="cancelar"&&editRes&&(
        <Overlay onClose={()=>setModal(null)} maxW={400}>
          <div style={{...S.modalHead,background:"var(--red)"}}>❌ Cancelar reserva <CloseBtn onClose={()=>setModal(null)}/></div>
          <div style={{padding:"1.1rem"}}>
            <div style={{background:"#FEE2E2",border:"1.5px solid var(--red)",borderRadius:10,padding:".5rem .8rem",fontSize:".75rem",color:"#7F1D1D",marginBottom:"1rem"}}>Esta acción no se puede deshacer.</div>
            <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
              {btn("❌ Cancelar totalmente",()=>cancelarReserva(editRes.id,"total"),"var(--red)")}
              {btn("🚚 Cancelar y cobrar transporte igual",()=>cancelarReserva(editRes.id,"transporte"),"var(--bronze)")}
            </div>
          </div>
        </Overlay>
      )}

      {modal==="promo"&&(
        <Overlay onClose={()=>setModal(null)} maxW={420}>
          <div style={S.modalHead}>🎁 Nueva Promoción <CloseBtn onClose={()=>setModal(null)}/></div>
          <div style={{padding:"1.1rem"}}>
            <div style={S.fg}><label style={S.lbl}>Equipo</label>
              <select value={promoForm.equipoId} onChange={e=>setPromoForm(f=>({...f,equipoId:e.target.value}))} style={S.inp}>
                {equipos.map(e=><option key={e.id} value={e.id}>{e.emoji} {e.nombre}</option>)}
              </select>
            </div>
            <div style={S.fg}><label style={S.lbl}>Título</label><input value={promoForm.titulo} onChange={e=>setPromoForm(f=>({...f,titulo:e.target.value}))} placeholder="Ej: HIFU 20% OFF" style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Descuento (%)</label><input type="number" min="1" max="80" value={promoForm.descuento} onChange={e=>setPromoForm(f=>({...f,descuento:e.target.value}))} style={S.inp}/></div>
          </div>
          <div style={S.modalFoot}>
            <button onClick={()=>setModal(null)} style={{padding:".4rem .85rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>Cancelar</button>
            {btn("Crear promo",crearPromo,"var(--purple)")}
          </div>
        </Overlay>
      )}

      {modal==="combo"&&(
        <Overlay onClose={()=>setModal(null)} maxW={480}>
          <div style={{...S.modalHead,position:"sticky",top:0}}>📦 Nuevo Combo <CloseBtn onClose={()=>setModal(null)}/></div>
          <div style={{padding:"1.1rem"}}>
            <div style={S.fg}><label style={S.lbl}>Nombre</label><input value={comboForm.nombre} onChange={e=>setComboForm(f=>({...f,nombre:e.target.value}))} style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Precio especial</label><input type="number" value={comboForm.precio} onChange={e=>setComboForm(f=>({...f,precio:e.target.value}))} style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Equipos (mín. 2)</label>
              <div style={{display:"flex",flexDirection:"column",gap:".26rem",maxHeight:190,overflowY:"auto",border:"1.5px solid var(--sand)",borderRadius:8,padding:".45rem .6rem",background:"var(--light)"}}>
                {equipos.map(e=>(
                  <label key={e.id} style={{display:"flex",alignItems:"center",gap:".35rem",fontSize:".8rem",cursor:"pointer"}}>
                    <input type="checkbox" checked={comboForm.equipoIds.includes(e.id)} onChange={ev=>setComboForm(f=>({...f,equipoIds:ev.target.checked?[...f.equipoIds,e.id]:f.equipoIds.filter(x=>x!==e.id)}))}/>
                    {e.emoji} {e.nombre} <span style={{color:"var(--mid)",fontSize:".68rem"}}>(${e.precio.toLocaleString()})</span>
                  </label>
                ))}
              </div>
            </div>
          </div>
          <div style={S.modalFoot}>
            <button onClick={()=>setModal(null)} style={{padding:".4rem .85rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>Cancelar</button>
            {btn("Crear combo",guardarCombo,"var(--teal)")}
          </div>
        </Overlay>
      )}

      {toast&&<div style={{position:"fixed",bottom:"1.3rem",right:"1.3rem",background:"var(--dark)",color:"var(--cream)",padding:".6rem .95rem",borderRadius:10,fontSize:".77rem",zIndex:500,borderLeft:"4px solid var(--gold)",boxShadow:"0 4px 20px rgba(0,0,0,.3)",maxWidth:300}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
