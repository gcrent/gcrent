          <th style={{padding:".46rem .75rem",textAlign:"left",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".07em",color:"var(--mid)",borderBottom:"1px solid var(--sand)"}}>Retiro</th>
          <th style={{padding:".46rem .75rem",textAlign:"left",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".07em",color:"var(--mid)",borderBottom:"1px solid var(--sand)"}}>Monto</th>
          <th style={{padding:".46rem .75rem",textAlign:"left",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".07em",color:"var(--mid)",borderBottom:"1px solid var(--sand)"}}>Seña</th>
          <th style={{padding:".46rem .75rem",textAlign:"left",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".07em",color:"var(--mid)",borderBottom:"1px solid var(--sand)"}}>Estado</th>
          {acciones&&<th style={{padding:".46rem .75rem",textAlign:"left",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".07em",color:"var(--mid)",borderBottom:"1px solid var(--sand)"}}>Acciones</th>}
        </tr></thead>
        <tbody>
          {rs.map(r=>(
            <tr key={r.id} style={{background:r.estado==="cancelado"?"#FFF0F0":"#fff"}}>
              {mostrarCliente&&<td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0"}}><strong>{r.clienteNombre}</strong></td>}
              <td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0",fontSize:".72rem"}}>{IL(r)}</td>
              <td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0",fontSize:".74rem"}}>{r.fecha}</td>
              <td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0",fontSize:".74rem"}}>{r.horaEntrega||"—"}</td>
              <td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0",fontSize:".74rem"}}>{r.horaRetiro||"—"}</td>
              <td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0",fontWeight:600}}>${r.monto.toLocaleString()}</td>
              <td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0",color:"var(--green)"}}>{r.senia>0?`$${r.senia.toLocaleString()}`:"—"}</td>
              <td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0"}}>{badge(r.estado)}</td>
              {acciones&&<td style={{padding:".46rem .75rem",borderBottom:"1px solid #EDE8E0"}}>
                <div style={{display:"flex",gap:".2rem",flexWrap:"wrap"}}>
                  {r.estado==="aceptada"&&<button style={{padding:".14rem .4rem",fontSize:".62rem",borderRadius:6,border:"none",background:"var(--green)",color:"#fff",cursor:"pointer"}} onClick={()=>cambiarEstado(r.id,"seña",{senia:Math.round(r.monto*.3)})}>💳</button>}
                  {["seña","activo"].includes(r.estado)&&<button style={{padding:".14rem .4rem",fontSize:".62rem",borderRadius:6,border:"none",background:"var(--green)",color:"#fff",cursor:"pointer"}} onClick={()=>cambiarEstado(r.id,"completado")}>✅</button>}
                  {r.estado!=="cancelado"&&<button style={{padding:".14rem .4rem",fontSize:".62rem",borderRadius:6,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer"}} onClick={()=>abrirEdicion(r)}>✏️</button>}
                  {r.estado!=="cancelado"&&<button style={{padding:".14rem .4rem",fontSize:".62rem",borderRadius:6,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer"}} onClick={()=>{setEditRes(r);setModal("duplicar");}}>📋</button>}
                  {r.estado!=="cancelado"&&<button style={{padding:".14rem .4rem",fontSize:".62rem",borderRadius:6,border:"none",background:"var(--red)",color:"#fff",cursor:"pointer"}} onClick={()=>{setEditRes(r);setModal("cancelar");}}>✕</button>}
                </div>
              </td>}
            </tr>
          ))}
        </tbody>
      </table>
    </div>

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>

        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.2rem",color:"var(--gold)",marginRight:"auto",letterSpacing:".1em"}}>GCRent</span>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setSeccion(n.id)} style={{background:"none",border:"none",color:seccion===n.id?"var(--gold)":"#9A8A7A",fontFamily:"'DM Sans',sans-serif",fontSize:".68rem",letterSpacing:".06em",textTransform:"uppercase",padding:".32rem .55rem",cursor:"pointer",borderBottom:seccion===n.id?"2px solid var(--gold)":"2px solid transparent",whiteSpace:"nowrap"}}>{n.l}</button>
        ))}
        <button onClick={()=>setRol(null)} style={{background:"none",border:"1px solid #444",color:"#888",fontSize:".65rem",padding:".18rem .48rem",borderRadius:5,cursor:"pointer",marginLeft:".4rem"}}>Salir</button>
      </nav>

      <main style={{flex:1,padding:"1rem 1.1rem",maxWidth:1180,margin:"0 auto",width:"100%"}}>

        {/* ══ AGENDA ════════════════════════════════════════════════════════ */}
        {seccion==="agenda"&&rol==="admin"&&(<>
          {alertas.map(a=><div key={a.id} style={{background:"#FFFBEB",border:"1.5px solid var(--gold)",borderRadius:10,padding:".5rem .8rem",fontSize:".75rem",color:"#713F12",display:"flex",alignItems:"center",gap:".4rem",marginBottom:".5rem"}}>🔔 <strong>Mañana:</strong> {a.clienteNombre} — {IL(a)}</div>)}
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:".7rem"}}>
            {btn("+ Nueva reserva",()=>{setForm(FDEF);setModal("nueva");},"var(--gold)")}
          </div>
          {reservas.length===0
            ? <div style={{textAlign:"center",padding:"3rem",color:"var(--mid)"}}>No hay reservas aún. ¡Creá la primera!</div>
            : <TablaReservas rs={[...reservas].sort((a,b)=>a.fecha.localeCompare(b.fecha))}/>
          }
        </>)}

        {/* ══ CALENDARIO ════════════════════════════════════════════════════ */}
        {seccion==="calendario"&&rol==="admin"&&(<>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:".8rem"}}>🗓 Calendario</h2>
          <CalendarView/>
          {selDay&&(
            <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,marginTop:".8rem",overflow:"hidden"}}>
              <div style={{background:"var(--light)",padding:".6rem 1rem",fontWeight:700,fontSize:".82rem",borderBottom:"1px solid var(--sand)",display:"flex",justifyContent:"space-between"}}>
                <span>Reservas del {selDay}</span>
                <span style={{fontSize:".72rem",color:"var(--mid)"}}>{resDia.length} turno{resDia.length!==1?"s":""}</span>
              </div>
              {resDia.length===0
                ? <div style={{padding:"1rem",textAlign:"center",color:"var(--mid)",fontSize:".8rem"}}>Sin turnos este día.</div>
                : resDia.map(r=>(
                  <div key={r.id} style={{padding:".55rem 1rem",borderBottom:"1px solid var(--sand)",display:"flex",alignItems:"center",gap:".7rem",cursor:"pointer"}} onClick={()=>abrirEdicion(r)}>
                    {getResColors(r,combos).map((c,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:c}}/>)}
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:".82rem"}}>{r.horaEntrega||"—"} — {r.clienteNombre}</div>
                      <div style={{fontSize:".72rem",color:"var(--mid)"}}>{IL(r)}</div>
                    </div>
                    {badge(r.estado)}
                  </div>
                ))
              }
            </div>
          )}
        </>)}

        {/* ══ EQUIPOS ═══════════════════════════════════════════════════════ */}
        {seccion==="equipos"&&rol==="admin"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem"}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem"}}>Catálogo</h2>
            {btn("📦 Nuevo combo",()=>setModal("combo"),"var(--teal)")}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:".85rem"}}>
            {EQUIPOS.map(e=>{
              const ocio=equiposOciosos.find(x=>x.id===e.id);
              return (
                <div key={e.id} style={{background:"#fff",border:`1px solid ${ocio?"#FCA5A5":"var(--sand)"}`,borderRadius:12,overflow:"hidden"}}>
                  <div style={{height:70,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.6rem",background:"linear-gradient(135deg,var(--sand),var(--bronze))",borderBottom:`3px solid ${EQUIPO_COLORS[e.id]}`}}>{e.emoji}</div>
                  <div style={{padding:".65rem"}}>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",marginBottom:".1rem"}}>{e.nombre}</div>
                    <div style={{fontSize:".67rem",color:"var(--mid)",marginBottom:".3rem"}}>{e.desc}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontWeight:700,color:"var(--bronze)",fontSize:".82rem"}}>${e.precio.toLocaleString()}</span>
                      <span style={{fontSize:".58rem",padding:".1rem .4rem",borderRadius:99,background:ocio?"#FEE2E2":"#D1FAE5",color:ocio?"#7F1D1D":"#064E3B",fontWeight:700}}>{ocio?"Ocioso":"Disp."}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>)}

        {/* ══ MÉTRICAS ══════════════════════════════════════════════════════ */}
        {seccion==="metricas"&&rol==="admin"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem",flexWrap:"wrap",gap:".5rem"}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",margin:0}}>📊 Métricas</h2>
            {btn("📥 Excel",exportarExcel,"var(--green)")}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:".85rem",marginBottom:"1rem"}}>
            {[
              {l:"Ingresos cobrados",v:`$${ingresos.toLocaleString()}`,s:`${resComp.length} completados`,c:"var(--bronze)"},
              {l:"Señas recibidas",v:`$${senias.toLocaleString()}`,s:"En garantía",c:"var(--gold)"},
              {l:"Turnos activos",v:resActivas.length,s:`de ${reservas.length} totales`,c:"var(--green)"},

            ].map((m,i)=>(
              <div key={i} style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,padding:".9rem 1.1rem",borderLeft:`4px solid ${m.c}`}}>
                <div style={{fontSize:".63rem",fontWeight:700,color:"var(--mid)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".18rem"}}>{m.l}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.7rem",color:"var(--dark)",lineHeight:1.1}}>{m.v}</div>
                <div style={{fontSize:".68rem",color:"var(--mid)",marginTop:".08rem"}}>{m.s}</div>
              </div>
            ))}
          </div>
          <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,overflow:"hidden"}}>

              {rankingClientes.map((c,i)=>(
                <div key={c.email} style={{display:"flex",alignItems:"center",gap:".65rem",padding:".45rem 0",borderBottom:"1px solid var(--sand)"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",color:"var(--sand)",minWidth:24,textAlign:"center"}}>#{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:".82rem"}}>{c.nombre}</div>
                    <div style={{fontSize:".66rem",color:"var(--mid)"}}>${c.monto.toLocaleString()}</div>
                  </div>
                  <span style={{fontWeight:700,color:"var(--bronze)"}}>{c.cant} reservas</span>
                </div>
              ))}
              {rankingClientes.length===0&&<div style={{textAlign:"center",color:"var(--mid)",fontSize:".8rem"}}>Sin datos aún.</div>}
            </div>
          </div>
        </>)}

        {/* ══ PROMOS ════════════════════════════════════════════════════════ */}
        {seccion==="promos"&&rol==="admin"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem"}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",margin:0}}>Promociones</h2>
            {btn("+ Nueva promo",()=>setModal("promo"),"var(--purple)")}
          </div>
          {promos.map(p=>{
            const e=eq(p.equipoId), pp=Math.round((e?.precio||0)*(1-p.descuento/100));
            return (
              <div key={p.id} style={{background:"#fff",border:"1px solid #DDD6FE",borderRadius:12,padding:".9rem 1.1rem",marginBottom:".7rem",borderLeft:"4px solid var(--purple)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:".45rem"}}>
                  <div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",marginBottom:".12rem"}}>{p.titulo}</div>
                    <div style={{fontSize:".7rem",color:"var(--mid)"}}>{e?.emoji} {e?.nombre}</div>
                    <div style={{marginTop:".3rem",display:"flex",gap:".4rem",alignItems:"center"}}>
                      <span style={{textDecoration:"line-through",color:"var(--mid)",fontSize:".75rem"}}>${e?.precio.toLocaleString()}</span>
                      <span style={{fontWeight:700,color:"var(--purple)",fontSize:".95rem"}}>${pp.toLocaleString()}</span>
                      <span style={{padding:".13rem .5rem",borderRadius:99,fontSize:".62rem",fontWeight:700,background:"#EDE9FE",color:"#4C1D95"}}>-{p.descuento}%</span>
                    </div>
                  </div>
                  <button onClick={()=>togglePromo(p)} style={{padding:".3rem .7rem",borderRadius:8,border:"none",background:p.activa?"var(--green)":"var(--sand)",color:p.activa?"#fff":"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>{p.activa?"Activa":"Inactiva"}</button>
                </div>
              </div>
            );
          })}
          {promos.length===0&&<div style={{textAlign:"center",padding:"2rem",color:"var(--mid)"}}>Sin promos. Creá la primera.</div>}
        </>)}

        {/* ══ BUSCAR ════════════════════════════════════════════════════════ */}
        {seccion==="buscar"&&rol==="admin"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem",flexWrap:"wrap",gap:".5rem"}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",margin:0}}>🔍 Buscar reservas</h2>
            {btn("📥 Exportar",exportarExcel,"var(--green)")}
          </div>
          <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,padding:".8rem .95rem",marginBottom:".9rem",display:"flex",gap:".6rem",alignItems:"flex-end",flexWrap:"wrap"}}>
            {[
              {label:"Cliente",value:filtroC,onChange:e=>setFiltroC(e.target.value),options:[{value:"",label:"Todas"},...clientes.map(([email,nombre])=>({value:email,label:nombre}))]},
              {label:"Equipo",value:filtroE,onChange:e=>setFiltroE(e.target.value),options:[{value:"",label:"Todos"},...EQUIPOS.map(e=>({value:e.id,label:`${e.emoji} ${e.nombre}`}))]},
              {label:"Estado",value:filtroEst,onChange:e=>setFiltroEst(e.target.value),options:[{value:"",label:"Todos"},{value:"aceptada",label:"Aceptada"},{value:"seña",label:"Con seña"},{value:"activo",label:"Activo"},{value:"completado",label:"Completado"},{value:"cancelado",label:"Cancelado"}]},
            ].map((f,i)=>(
              <div key={i} style={{flex:1,minWidth:130}}>
                <label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>{f.label}</label>
                <select value={f.value} onChange={f.onChange} style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}>
                  {f.options.map((o,j)=><option key={j} value={o.value}>{o.label}</option>)}
                </select>
              </div>
            ))}
            <div style={{minWidth:120}}>
              <label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Mes</label>
              <input type="month" value={filterMes} onChange={e=>setFilterMes(e.target.value)} style={{padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}/>
            </div>
            <button onClick={()=>{setFiltroC("");setFiltroE("");setFiltroEst("");setFilterMes("");}} style={{padding:".4rem .7rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600,alignSelf:"flex-end"}}>✕ Limpiar</button>
          </div>
          <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:14,overflow:"hidden"}}>
            <div style={{background:"var(--dark)",color:"var(--cream)",padding:".75rem 1.15rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem"}}>Resultados — {reservasFiltradas.length} registros</div>
            {reservasFiltradas.length===0?<div style={{padding:"2rem",textAlign:"center",color:"var(--mid)"}}>Sin resultados.</div>:<TablaReservas rs={reservasFiltradas}/>}
          </div>
        </>)}

        {/* ══ TRANSPORTISTA ════════════════════════════════════════════════ */}
        {seccion==="logistica"&&rol==="transportista"&&(<>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:".8rem"}}>🚚 Mis Entregas</h2>
          {reservas.filter(r=>!["completado","cancelado"].includes(r.estado)).sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(r=>(
            <div key={r.id} style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,padding:".9rem 1.1rem",marginBottom:".7rem",borderLeft:"4px solid var(--blue)"}}>
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:".4rem",marginBottom:".5rem"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".98rem"}}>{IL(r)}</div>
                <div style={{display:"flex",gap:".4rem",alignItems:"center"}}>
                  {badge(r.estado)}
                  <span style={{fontWeight:700,color:"var(--blue)",fontSize:".78rem"}}>${(r.tarifaTransporte||tarifaBase).toLocaleString()}</span>
                </div>
              </div>
              <div style={{fontSize:".78rem",display:"flex",flexDirection:"column",gap:".18rem"}}>
                <span>👤 {r.clienteNombre}</span>
                <span>📅 {r.fecha} · 🟢 {r.horaEntrega||"—"} · 🔴 {r.horaRetiro||"—"}</span>
                <span>📍 {r.direccion||"—"}</span>
              </div>
              <div style={{display:"flex",gap:".3rem",marginTop:".6rem"}}>
                {r.estado==="aceptada"&&btn("📦 Entregar",()=>cambiarEstado(r.id,"activo"),"var(--blue)")}
                {r.estado==="activo"&&btn("↩️ Retirado",()=>cambiarEstado(r.id,"completado"),"var(--mid)")}
              </div>
            </div>
          ))}
          {reservas.filter(r=>!["completado","cancelado"].includes(r.estado)).length===0&&<div style={{textAlign:"center",padding:"3rem",color:"var(--mid)"}}>Sin entregas pendientes.</div>}
        </>)}

        {/* ══ MI SEMANA ════════════════════════════════════════════════════ */}
        {seccion==="semana"&&rol==="transportista"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem",flexWrap:"wrap",gap:".4rem"}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",margin:0}}>💰 Mi Semana</h2>
            <div style={{display:"flex",gap:".3rem"}}>
              {btn("‹",()=>setSemOff(o=>o-1),"var(--mid)")}
              {btn("Hoy",()=>setSemOff(0),"var(--mid)")}
              {btn("›",()=>setSemOff(o=>o+1),"var(--mid)")}
            </div>
          </div>
          <div style={{background:"var(--blue)",color:"#fff",padding:".58rem .9rem",fontWeight:600,fontSize:".8rem",display:"flex",justifyContent:"space-between",borderRadius:"12px 12px 0 0"}}>
            <span>{semLabel(lunesSem)}</span><span>Total: ${totalSem.toLocaleString()}</span>
          </div>
          <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
            {resSem.length===0?<div style={{padding:"1.4rem",textAlign:"center",color:"var(--mid)",fontSize:".8rem"}}>Sin viajes esta semana.</div>
            :<TablaReservas rs={resSem.sort((a,b)=>a.fecha.localeCompare(b.fecha))} acciones={false} mostrarCliente={true}/>}
          </div>
        </>)}

        {/* ══ CLIENTE: CALENDARIO ══════════════════════════════════════════ */}
        {seccion==="calendario_cliente"&&rol==="cliente"&&(<>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:".8rem"}}>📅 Mi calendario</h2>
          <CalendarView/>
          {selDay&&(()=>{
            const misResDia=reservas.filter(r=>r.clienteEmail===clienteEmail&&r.fecha===selDay&&r.estado!=="cancelado");
            return misResDia.length>0?(
              <div style={{background:"#fff",border:"1px solid var(--sand)",borderRadius:12,marginTop:".8rem",overflow:"hidden"}}>
                <div style={{background:"var(--light)",padding:".6rem 1rem",fontWeight:700,fontSize:".82rem",borderBottom:"1px solid var(--sand)"}}>Mis reservas del {selDay}</div>
                {misResDia.map(r=>(
                  <div key={r.id} style={{padding:".55rem 1rem",borderBottom:"1px solid var(--sand)",display:"flex",alignItems:"center",gap:".7rem"}}>
                    {getResColors(r,combos).map((c,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:c}}/>)}
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:".82rem"}}>{r.horaEntrega||"—"} — {IL(r)}</div>
                      <div style={{fontSize:".72rem",color:"var(--mid)"}}>Monto: ${r.monto.toLocaleString()}</div>
                    </div>
                    {badge(r.estado)}
                  </div>
                ))}
              </div>
            ):null;
          })()}
        </>)}

        {/* ══ CLIENTE: MIS RESERVAS ════════════════════════════════════════ */}
        {seccion==="buscar_cliente"&&rol==="cliente"&&(()=>{
          const misR=reservas.filter(r=>r.clienteEmail===clienteEmail).sort((a,b)=>a.fecha.localeCompare(b.fecha));
          return (<>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:".8rem"}}>🔍 Mis Reservas</h2>
            {misR.length===0?<div style={{textAlign:"center",padding:"3rem",color:"var(--mid)"}}>Sin reservas.</div>:<TablaReservas rs={misR} acciones={false} mostrarCliente={false}/>}
          </>);
        })()}

      </main>

      {/* ══ MODALES ═══════════════════════════════════════════════════════ */}
      {modal==="nueva"&&<FormReserva titulo="Nueva Reserva" form={form} fv={fv} promos={promos} combos={combos} onSubmit={guardarReserva} onCancel={()=>setModal(null)} submitLabel="Guardar reserva"/>}
      {modal==="editar"&&editRes&&<FormReserva titulo={`Editar — ${editRes.clienteNombre}`} form={form} fv={fv} promos={promos} combos={combos} onSubmit={guardarEdicion} onCancel={()=>{setModal(null);setEditRes(null);setForm(FDEF);}} submitLabel="Guardar cambios"/>}

      {modal==="duplicar"&&editRes&&(
        <div style={{position:"fixed",inset:0,background:"rgba(24,18,12,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"}} onClick={()=>setModal(null)}>
          <div style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:400,padding:"1.5rem",boxShadow:"0 24px 80px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",marginBottom:"1rem"}}>📋 Duplicar reserva</div>
            <div style={{background:"var(--light)",borderRadius:10,padding:".85rem",marginBottom:".85rem",fontSize:".8rem"}}><strong>{editRes.clienteNombre}</strong> · {IL(editRes)}<br/>{editRes.fecha}</div>
            <label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Nueva fecha</label>
            <input type="date" value={dupFecha} onChange={e=>setDupFecha(e.target.value)} style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem",marginBottom:"1rem"}}/>
            <div style={{display:"flex",gap:".5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(null)} style={{padding:".4rem .85rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>Cancelar</button>
              {btn("Duplicar",()=>duplicarReserva(editRes),"var(--teal)")}
            </div>
          </div>
        </div>
      )}

      {modal==="cancelar"&&editRes&&(
        <div style={{position:"fixed",inset:0,background:"rgba(24,18,12,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"}} onClick={()=>setModal(null)}>
          <div style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:400,overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"var(--red)",color:"#fff",padding:".78rem 1.1rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",display:"flex",justifyContent:"space-between"}}>❌ Cancelar reserva <CloseBtn onClose={()=>setModal(null)}/></div>
            <div style={{padding:"1.1rem"}}>
              <div style={{background:"#FEE2E2",border:"1.5px solid var(--red)",borderRadius:10,padding:".5rem .8rem",fontSize:".75rem",color:"#7F1D1D",marginBottom:"1rem"}}>Esta acción no se puede deshacer.</div>
              <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
                {btn("❌ Cancelar totalmente",()=>cancelarReserva(editRes.id,"total"),"var(--red)")}
                {btn("🚚 Cancelar y cobrar transporte igual",()=>cancelarReserva(editRes.id,"transporte"),"var(--bronze)")}
              </div>
            </div>
          </div>
        </div>
      )}

      {modal==="promo"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(24,18,12,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"}} onClick={()=>setModal(null)}>
          <div style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:420,overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"var(--dark)",color:"var(--cream)",padding:".78rem 1.1rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",display:"flex",justifyContent:"space-between"}}>🎁 Nueva Promoción <CloseBtn onClose={()=>setModal(null)}/></div>
            <div style={{padding:"1.1rem"}}>
              <div style={{marginBottom:".75rem"}}><label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Equipo</label>
                <select value={promoForm.equipoId} onChange={e=>setPromoForm(f=>({...f,equipoId:e.target.value}))} style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}>
                  {EQUIPOS.map(e=><option key={e.id} value={e.id}>{e.emoji} {e.nombre}</option>)}
                </select>
              </div>
              <div style={{marginBottom:".75rem"}}><label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Título</label><input value={promoForm.titulo} onChange={e=>setPromoForm(f=>({...f,titulo:e.target.value}))} placeholder="Ej: Criolipolisis 20% OFF" style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}/></div>
              <div style={{marginBottom:".75rem"}}><label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Descuento (%)</label><input type="number" min="1" max="80" value={promoForm.descuento} onChange={e=>setPromoForm(f=>({...f,descuento:e.target.value}))} style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}/></div>
            </div>
            <div style={{padding:".78rem 1.1rem",borderTop:"1px solid var(--sand)",display:"flex",gap:".5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(null)} style={{padding:".4rem .85rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>Cancelar</button>
              {btn("Crear promo",crearPromo,"var(--purple)")}
            </div>
          </div>
        </div>
      )}

      {modal==="combo"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(24,18,12,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"}} onClick={()=>setModal(null)}>
          <div style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:480,overflow:"hidden",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"var(--dark)",color:"var(--cream)",padding:".78rem 1.1rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",display:"flex",justifyContent:"space-between",position:"sticky",top:0}}>📦 Nuevo Combo <CloseBtn onClose={()=>setModal(null)}/></div>
            <div style={{padding:"1.1rem"}}>
              <div style={{marginBottom:".75rem"}}><label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Nombre</label><input value={comboForm.nombre} onChange={e=>setComboForm(f=>({...f,nombre:e.target.value}))} placeholder="Ej: Pack Reafirmante" style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}/></div>
              <div style={{marginBottom:".75rem"}}><label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Descripción</label><input value={comboForm.desc} onChange={e=>setComboForm(f=>({...f,desc:e.target.value}))} style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}/></div>
              <div style={{marginBottom:".75rem"}}><label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Precio especial</label><input type="number" value={comboForm.precio} onChange={e=>setComboForm(f=>({...f,precio:e.target.value}))} style={{width:"100%",padding:".46rem .7rem",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:".84rem"}}/></div>
              <div style={{marginBottom:".75rem"}}><label style={{display:"block",fontSize:".66rem",fontWeight:600,color:"var(--mid)",marginBottom:".16rem",textTransform:"uppercase",letterSpacing:".06em"}}>Equipos (mín. 2)</label>
                <div style={{display:"flex",flexDirection:"column",gap:".26rem",maxHeight:190,overflowY:"auto",border:"1.5px solid var(--sand)",borderRadius:8,padding:".45rem .6rem",background:"var(--light)"}}>
                  {EQUIPOS.map(e=>(
                    <label key={e.id} style={{display:"flex",alignItems:"center",gap:".35rem",fontSize:".8rem",cursor:"pointer"}}>
                      <input type="checkbox" checked={comboForm.equipoIds.includes(e.id)} onChange={ev=>setComboForm(f=>({...f,equipoIds:ev.target.checked?[...f.equipoIds,e.id]:f.equipoIds.filter(x=>x!==e.id)}))}/>
                      {e.emoji} {e.nombre} <span style={{color:"var(--mid)",fontSize:".68rem"}}>(${e.precio.toLocaleString()})</span>
                    </label>
                  ))}
                </div>
              </div>
            </div>
            <div style={{padding:".78rem 1.1rem",borderTop:"1px solid var(--sand)",display:"flex",gap:".5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(null)} style={{padding:".4rem .85rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".76rem",fontWeight:600}}>Cancelar</button>
              {btn("Crear combo",guardarCombo,"var(--teal)")}
            </div>
          </div>
        </div>
      )}

      {toast&&<div style={{position:"fixed",bottom:"1.3rem",right:"1.3rem",background:"var(--dark)",color:"var(--cream)",padding:".6rem .95rem",borderRadius:10,fontSize:".77rem",zIndex:500,borderLeft:"4px solid var(--gold)",boxShadow:"0 4px 20px rgba(0,0,0,.3)",maxWidth:300}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
