function tieneConflicto(reservas,equipoId,fecha,horaEntrega,horaRetiro,excludeId){
  const eId=parseInt(String(equipoId),10);
  if(!eId||!fecha)return false;
  const hE=horaEntrega||"00:00",hR=horaRetiro||"23:59";
  for(let i=0;i<reservas.length;i++){
    const r=reservas[i];
    if(r.estado==="cancelado")continue;
    if(excludeId!=null&&String(r.id)===String(excludeId))continue;
    if(parseInt(String(r.equipoId),10)!==eId)continue;
    if(String(r.fecha)!==String(fecha))continue;
    const rE=r.horaEntrega||"00:00",rR=r.horaRetiro||"23:59";
    if(hE<rR&&hR>rE)return true;
  }
  return false;
}

        <Overlay onClose={()=>setModal(null)} maxW={400}>
          <div style={S.mh}>Duplicar <CloseBtn onClose={()=>setModal(null)}/></div>
          <div style={{padding:"1.2rem"}}>
            <div style={{background:"var(--light)",borderRadius:10,padding:"1rem",marginBottom:"1rem",fontSize:".9rem"}}><strong>{editRes.clienteNombre}</strong> · {IL(editRes)}<br/>{fmtVis(editRes.fecha)}</div>
            <div style={S.fg}><label style={S.lbl}>Nueva fecha</label><input type="date" value={dupFecha} onChange={e=>setDupFecha(e.target.value)} style={S.inp}/></div>
          </div>
          <div style={S.mf}>
            <button onClick={()=>setModal(null)} style={{padding:".5rem 1rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".9rem",fontWeight:600}}>Cancelar</button>
            {btn("Duplicar",()=>duplicarReserva(editRes),"var(--teal)")}
          </div>
        </Overlay>
      )}

      {modalSerie==="editar"&&(
        <Overlay onClose={()=>setModalSerie(null)} maxW={400}>
          <div style={S.mh}>Editar evento repetido <CloseBtn onClose={()=>setModalSerie(null)}/></div>
          <div style={{padding:"1.2rem"}}>
            <div style={{background:"var(--light)",borderRadius:10,padding:".8rem 1rem",marginBottom:"1rem",fontSize:".88rem",color:"var(--mid)"}}>Esta reserva es parte de una serie. Que querés modificar?</div>
            <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
              {btn("Solo este evento",()=>guardarEdicion("solo"),"var(--bronze)")}
              {btn("Este y todos los eventos futuros",()=>guardarEdicion("futuros"),"var(--blue)")}
            </div>
          </div>
          <div style={S.mf}>
            <button onClick={()=>setModalSerie(null)} style={{padding:".5rem 1rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".9rem",fontWeight:600}}>Cancelar</button>
          </div>
        </Overlay>
      )}

      {modalSerie==="cancelar"&&editRes&&(
        <Overlay onClose={()=>setModalSerie(null)} maxW={400}>
          <div style={{...S.mh,background:"var(--red)"}}>Cancelar serie <CloseBtn onClose={()=>setModalSerie(null)}/></div>
          <div style={{padding:"1.2rem"}}>
            <div style={{background:"#FEE2E2",border:"1.5px solid var(--red)",borderRadius:10,padding:".6rem .9rem",fontSize:".88rem",color:"#7F1D1D",marginBottom:"1rem"}}>Que eventos querés cancelar?</div>
            <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
              {btn("Solo este evento",()=>cancelarReserva(editRes.id,"total"),"var(--red)")}
              {btn("Este y todos los futuros",()=>cancelarSerie(editRes),"#7F1D1D")}
            </div>
          </div>
          <div style={S.mf}>
            <button onClick={()=>setModalSerie(null)} style={{padding:".5rem 1rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".9rem",fontWeight:600}}>Volver</button>
          </div>
        </Overlay>
      )}

      {modal==="cancelar"&&editRes&&(
        <Overlay onClose={()=>setModal(null)} maxW={400}>
          <div style={{...S.mh,background:"var(--red)"}}>Cancelar reserva <CloseBtn onClose={()=>setModal(null)}/></div>
          <div style={{padding:"1.2rem"}}>
            <div style={{background:"#FEE2E2",border:"1.5px solid var(--red)",borderRadius:10,padding:".6rem .9rem",fontSize:".88rem",color:"#7F1D1D",marginBottom:"1rem"}}>Esta acción no se puede deshacer.</div>
            {editRes.serieId&&<div style={{background:"#FEF3C7",border:"1.5px solid var(--gold)",borderRadius:10,padding:".6rem .9rem",fontSize:".88rem",color:"#92400E",marginBottom:"1rem"}}>Esta reserva es parte de una serie.</div>}
            <div style={S.fg}><label style={S.lbl}>Observaciones (motivo de cancelación)</label><textarea value={form.observaciones||""} onChange={e=>fv("observaciones",e.target.value)} placeholder="Ej: canceló por viaje, reagendó para..." rows={2} style={{...S.inp,resize:"vertical",fontFamily:"'DM Sans',sans-serif"}}/></div>
            <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
              {btn("Cancelar totalmente",()=>cancelarReserva(editRes.id,"total"),"var(--red)")}
              {btn("Cancelar y cobrar transporte",()=>cancelarReserva(editRes.id,"transporte"),"var(--bronze)")}
              {editRes.serieId&&btn("Cancelar este y todos los futuros",()=>setModalSerie("cancelar"),"#7F1D1D")}
            </div>
          </div>
          <div style={S.mf}>
            <button onClick={()=>setModal(null)} style={{padding:".5rem 1rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".9rem",fontWeight:600}}>Volver</button>
          </div>
        </Overlay>
      )}

      {modal==="promo"&&(
        <Overlay onClose={()=>setModal(null)} maxW={420}>
          <div style={S.mh}>Nueva Promoción <CloseBtn onClose={()=>setModal(null)}/></div>
          <div style={{padding:"1.2rem"}}>
            <div style={S.fg}><label style={S.lbl}>Equipo</label><select value={promoForm.equipoId} onChange={e=>setPromoForm(f=>({...f,equipoId:e.target.value}))} style={S.inp}>{equipos.map(e=><option key={e.id} value={e.id}>{e.emoji} {e.nombre}</option>)}</select></div>
            <div style={S.fg}><label style={S.lbl}>Título</label><input value={promoForm.titulo} onChange={e=>setPromoForm(f=>({...f,titulo:e.target.value}))} placeholder="Ej: HIFU 20% OFF" style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Descuento (%)</label><input type="number" min="1" max="80" value={promoForm.descuento} onChange={e=>setPromoForm(f=>({...f,descuento:e.target.value}))} style={S.inp}/></div>
          </div>
          <div style={S.mf}>
            <button onClick={()=>setModal(null)} style={{padding:".5rem 1rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".9rem",fontWeight:600}}>Cancelar</button>
            {btn("Crear promo",crearPromo,"var(--purple)")}
          </div>
        </Overlay>
      )}

      {modal==="combo"&&(
        <Overlay onClose={()=>setModal(null)} maxW={480}>
          <div style={{...S.mh,position:"sticky",top:0,zIndex:10}}>{editCombo?"Editar Combo":"Nuevo Combo"} <CloseBtn onClose={()=>{setModal(null);setEditCombo(null);}}/></div>
          <div style={{padding:"1.2rem"}}>
            <div style={S.fg}><label style={S.lbl}>Nombre</label><input value={comboForm.nombre} onChange={e=>setComboForm(f=>({...f,nombre:e.target.value}))} style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Precio especial</label><input type="number" value={comboForm.precio} onChange={e=>setComboForm(f=>({...f,precio:e.target.value}))} style={S.inp}/></div>
            <div style={S.fg}><label style={S.lbl}>Equipos (mín. 2)</label>
              <div style={{display:"flex",flexDirection:"column",gap:".3rem",maxHeight:200,overflowY:"auto",border:"1.5px solid var(--sand)",borderRadius:8,padding:".5rem .7rem",background:"var(--light)"}}>
                {equipos.map(e=>(
                  <label key={e.id} style={{display:"flex",alignItems:"center",gap:".4rem",fontSize:".88rem",cursor:"pointer"}}>
                    <input type="checkbox" checked={comboForm.equipoIds.includes(e.id)} onChange={ev=>setComboForm(f=>({...f,equipoIds:ev.target.checked?[...f.equipoIds,e.id]:f.equipoIds.filter(x=>x!==e.id)}))}/>
                    {e.emoji} {e.nombre} <span style={{color:"var(--mid)",fontSize:".75rem"}}>(${e.precio.toLocaleString()})</span>
                  </label>
                ))}
              </div>
            </div>
          </div>
          <div style={S.mf}>
            <button onClick={()=>{setModal(null);setEditCombo(null);}} style={{padding:".5rem 1rem",borderRadius:8,border:"1.5px solid var(--sand)",background:"transparent",color:"var(--mid)",cursor:"pointer",fontSize:".9rem",fontWeight:600}}>Cancelar</button>
            {btn(editCombo?"Guardar cambios":"Crear combo",guardarCombo,"var(--teal)")}
          </div>
        </Overlay>
      )}

      {toast&&<div style={{position:"fixed",bottom:"1.3rem",right:"1.3rem",background:"var(--dark)",color:"var(--cream)",padding:".7rem 1rem",borderRadius:10,fontSize:".85rem",zIndex:500,borderLeft:"4px solid var(--gold)",boxShadow:"0 4px 20px rgba(0,0,0,.3)",maxWidth:320}}>{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
